{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'post_list' %}">MY_BLOG</a>
        
        <div class="ms-auto d-flex align-items-center">
            {% if user.is_authenticated %}
                <span class="navbar-text me-3 text-light">
                    Привет, <strong>{{ user.username }}</strong>
                </span>
                <form action="{% url 'logout' %}" method="post" class="m-0">
                    {% csrf_token %}
                    <button class="btn btn-sm btn-outline-danger">Выход</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-sm btn-outline-light me-2">Вход</a>
                <a href="{% url 'register' %}" class="btn btn-sm btn-primary">Регистрация</a>
            {% endif %}
        </div>
    </div>
</nav>

<main class="container">
    {% block content %}
    {% endblock %}
</main>

<footer class="text-center py-4 mt-5 text-muted small">
    &copy; 2024 Мой Django Блог
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
